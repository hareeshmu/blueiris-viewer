name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Restore keystore and signing config
        env:
          STORE_B64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          STORE_PASS: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p keystore
          printf '%s' "$STORE_B64" | base64 -d > keystore/release.jks
          {
            printf 'storeFile=keystore/release.jks\n'
            printf 'storePassword=%s\n' "$STORE_PASS"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASS"
          } > keystore.properties

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage artifact
        id: stage
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          OUT="blueiris-viewer-${TAG_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$OUT"
          printf 'apk=%s\n' "$OUT" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.apk }}
          generate_release_notes: true
          draft: false
          prerelease: false
